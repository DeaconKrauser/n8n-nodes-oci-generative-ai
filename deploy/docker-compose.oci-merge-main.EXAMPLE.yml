# Optional merge file — does NOT replace docker-compose-main.yml.
# Usage: docker compose -f docker-compose-main.yml -f docker-compose.oci-merge-main.yml up -d
#
# IMPORTANT: the service name under "services:" must match your compose.
# Check with: docker compose -f docker-compose-main.yml config --services
# If it returns "n8n_main", use n8n_main: below. Never use "n8n:" unless your
# main compose defines a service named "n8n" with an image — otherwise Compose
# will fail with "service has neither an image nor a build context".
#
# The /home/ubuntu/n8n/data volume shares n8n data (community nodes, config, etc.)
# between main and worker. Without it, node_modules won't persist and you'll get
# "Unrecognized node type" errors.
# Create on host: mkdir -p /home/ubuntu/n8n/data && sudo chown -R 1000:1000 /home/ubuntu/n8n/data
services:
  n8n_main:
    environment:
      # Path inside the container, visible to the "node" user (n8nio/n8n image)
      N8N_CUSTOM_EXTENSIONS: /home/node/.n8n/custom/n8n-nodes-oci-generative-ai
    volumes:
      - /home/ubuntu/n8n/data:/home/node/.n8n
      - /home/ubuntu/n8n/custom-extensions/n8n-nodes-oci-generative-ai:/home/node/.n8n/custom/n8n-nodes-oci-generative-ai:rw
