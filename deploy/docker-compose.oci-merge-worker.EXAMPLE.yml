# Optional merge file — does NOT replace docker-compose-worker.yml.
# Usage: docker compose -f docker-compose-worker.yml -f docker-compose.oci-merge-worker.yml up -d
# If that fails with "service n8n has neither an image", include the main file too (three -f flags).
#
# IMPORTANT: the service name under "services:" must match your worker compose.
# Check with: docker compose -f docker-compose-worker.yml config --services
# Replace "n8n_worker" below with the actual service name if different.
# Never use "n8n:" here — it must match an existing service with an image.
#
# Uses the same data bind as the main merge (required in queue mode).
services:
  n8n_worker:
    environment:
      N8N_CUSTOM_EXTENSIONS: /home/node/.n8n/custom/n8n-nodes-oci-generative-ai
    volumes:
      - /home/ubuntu/n8n/data:/home/node/.n8n
      - /home/ubuntu/n8n/custom-extensions/n8n-nodes-oci-generative-ai:/home/node/.n8n/custom/n8n-nodes-oci-generative-ai:rw
